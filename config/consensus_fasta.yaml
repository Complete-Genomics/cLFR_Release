sample_id: data

# Chromosomes/contigs to process. Names must match the mapping reference.
chroms:
  - chr1

inputs:
  read1: /path/to/read_1.fq.gz
  read2: /path/to/read_2.fq.gz

paths:
  output_dir: Align
  # Genome FASTA used by samtools consensus. For STAR/HISAT2, this is still
  # needed after mapping for consensus sequence generation.
  ref_fasta: /path/to/genome.fa

# For SE600 use minimap2; for PE150 use hisat2.
mapping:
  # Supported: star, hisat2, minimap2, bwa
  mapper: star
  # ref_fasta is only needed for bwa/minimap2; STAR/HISAT2 use their indexes.
  # ref_fasta: /path/to/mapping_genome.fa

  # STAR
  star_index: /path/to/star_index

  # HISAT2
  hisat2_index: /path/to/hisat2_index
  hisat2_splicesites: /path/to/splicesites.txt

  # minimap2
  minimap2_preset: splice:sr
  minimap2_anno_bed: ""

  # BWA
  bwa_mem: mem

tools:
  python: python
  samtools: samtools
  stringtie: stringtie
  pigz: pigz
  star: STAR
  hisat2: hisat2
  minimap2: minimap2
  bwa: bwa
  gatk: gatk

params:
  sequence_type: pe
  platform: BGI-seq

  # cLFR random barcode/UMI parsing.
  bc_condition: random_bc
  umi_len: 15
  bc_len_redundant: 15
  bc_start: 0
  gdna_start: 1
  read_len: 150
  read_len_r1: 150
  gdna_start_r1: 1
  additional_bc_start: 0
  additional_bc_len: 0
  additional_bc_len_r1: 0
  reverse_complement_umi: false

  # Consensus generation.
  min_reads: 50
  minreads_fasta: 100
  num_splits: 5
  downsample_ratio: 1.0
  batch_id: ""
  temp_dir: /dev/shm/consensus
  # Pass -T ref.fa to samtools consensus. Disabled by default because it can be slow.
  use_samtools_reference: false

threads:
  split: 8
  mapping: 16
